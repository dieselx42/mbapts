<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SUBJECT}}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f7f8;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #383838;
    }
    table {
      border-collapse: collapse;
    }
    .wrapper {
      width: 100%;
      table-layout: fixed;
      background-color: #f5f7f8;
      padding: 24px 0;
    }
    .main {
      width: 100%;
      max-width: 640px;
      background-color: #ffffff;
      margin: 0 auto;
      border: 1px solid #e3e3e3;
    }
    .header {
      background-color: #383838;
      text-align: center;
      padding: 24px;
    }
    .logo {
      max-width: 220px;
      height: auto;
    }
    .hero-image {
      width: 100%;
      height: auto;
      display: block;
    }
    .content {
      padding: 28px 30px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 300;
      color: #383838;
    }
    h2 {
      margin: 24px 0 8px 0;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 400;
      color: #383838;
    }
    p {
      margin: 0 0 12px 0;
      font-size: 16px;
      line-height: 1.6;
      color: #383838;
    }
    ul {
      margin: 0 0 16px 18px;
      padding: 0;
    }
    li {
      margin-bottom: 8px;
      font-size: 16px;
      line-height: 1.5;
    }
    .stats-table {
      width: 100%;
      margin: 12px 0 16px 0;
      border: 1px solid #e6e6e6;
    }
    .stats-table td {
      width: 33.33%;
      border-right: 1px solid #e6e6e6;
      padding: 14px 10px;
      text-align: center;
      vertical-align: top;
    }
    .stats-table td:last-child {
      border-right: none;
    }
    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7a7a7a;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 22px;
      line-height: 1.2;
      color: #2baadf;
      font-weight: 400;
    }
    .cta-wrap {
      margin: 22px 0 8px 0;
      text-align: center;
    }
    .cta {
      display: inline-block;
      padding: 12px 22px;
      background-color: #2baadf;
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border-radius: 2px;
    }
    .secondary-cta {
      background-color: #383838;
      margin-left: 8px;
    }
    .divider {
      height: 1px;
      background-color: #e8e8e8;
      margin: 20px 0;
    }
    .footer {
      background-color: #383838;
      padding: 22px 30px;
      color: #c4c4c4;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }
    .footer a {
      color: #ffffff;
      text-decoration: underline;
    }
    @media screen and (max-width: 640px) {
      .content {
        padding: 22px 18px;
      }
      h1 {
        font-size: 25px;
      }
      h2 {
        font-size: 20px;
      }
      .stats-table td {
        display: block;
        width: auto;
        border-right: none;
        border-bottom: 1px solid #e6e6e6;
      }
      .stats-table td:last-child {
        border-bottom: none;
      }
      .secondary-cta {
        margin: 10px 0 0 0;
        display: block;
      }
    }
  </style>
</head>
<body>
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
    {{PREHEADER}}
  </div>
  <table class="wrapper" role="presentation" width="100%">
    <tr>
      <td>
        <table class="main" role="presentation" width="100%">
          <tr>
            <td class="header">
              <img src="{{LOGO_URL}}" alt="Miami Beach Apartments" class="logo">
            </td>
          </tr>
          <tr>
            <td>
              <img src="{{HERO_IMAGE_URL}}" alt="{{HERO_ALT}}" class="hero-image">
            </td>
          </tr>
          <tr>
            <td class="content">
              {{BODY_CONTENT}}
            </td>
          </tr>
          <tr>
            <td class="footer">
              <p style="margin:0 0 8px 0;color:#ffffff;">{{BROKER_NAME}} | {{BROKER_TITLE}}</p>
              <p style="margin:0 0 8px 0;">{{BROKERAGE_NAME}} | {{BROKERAGE_PHONE}} | {{BROKERAGE_EMAIL}}</p>
              <p style="margin:0 0 10px 0;">{{BROKERAGE_ADDRESS}}</p>
              <p style="margin:0 0 8px 0;">
                <a href="{{WEBSITE_URL}}">Website</a> | <a href="{{UNSUBSCRIBE_URL}}">Unsubscribe</a>
              </p>
              <p style="margin:0;">Equal Housing Opportunity. All information deemed reliable but not guaranteed.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
